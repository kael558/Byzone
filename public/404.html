<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>By Zone</title>
    <script>
      // GitHub Pages SPA fallback — redirect to index.html, preserving the path
      // so BrowserRouter can pick it up on load.
      var path = window.location.pathname;
      sessionStorage.setItem('__spa_redirect', path);
      window.location.replace('/');
    </script>
  </head>
  <body></body>
</html>
