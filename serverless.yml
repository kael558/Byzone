service: byzone-api

frameworkVersion: '4'

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  memorySize: 256
  timeout: 10
  environment:
    SES_FROM_EMAIL: rahel.gunaratne@gmail.com
    SES_TO_EMAIL: rahel.gunaratne@gmail.com
    ALLOWED_ORIGINS: https://byzone.ca,https://kael558.github.io
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - ses:SendEmail
            - ses:SendRawEmail
          Resource: '*'

functions:
  sendQuote:
    handler: api/send-quote.handler
    description: Receives quote form submissions and emails them via SES
    events:
      - httpApi:
          path: /api/send-quote
          method: POST
      - httpApi:
          path: /api/send-quote
          method: OPTIONS

package:
  patterns:
    - 'api/**'
    - '!node_modules/**'
    - '!src/**'
    - '!dist/**'
    - '!public/**'
